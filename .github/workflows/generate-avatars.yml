name: Generate Team Avatars

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate every avatar even if one already exists"
        required: false
        type: boolean
        default: false

  # When the form poller commits new entries, kick off a backfill so brand-new
  # team names get an avatar without any human action. (Note: poll-form's cron
  # is currently disabled — this still works for manual poll-form runs.)
  workflow_run:
    workflows: ["Poll Google Form"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-avatars
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Don't run when triggered by a failed poll-form run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if OPENAI_API_KEY is not set
        id: gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret not set — avatar generation not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate avatars
        if: steps.gate.outputs.configured == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python scripts/generate_avatars.py --force
          else
            python scripts/generate_avatars.py
          fi

      - name: Commit new avatars
        if: steps.gate.outputs.configured == 'true'
        run: |
          git config user.name "masters-pool-bot"
          git config user.email "masters-pool-bot@users.noreply.github.com"
          if git diff --quiet -- data/avatars; then
            echo "No avatar changes."
            exit 0
          fi
          git add data/avatars
          git commit -m "avatars: generate $(date -u +'%Y-%m-%d %H:%MZ')"
          # Race with update-scores.yml: it touches data/scores.json, we touch
          # data/avatars/, so a rebase is guaranteed conflict-free. Retry a few
          # times in case another commit lands while we're rebasing.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep 3
          done
          echo "Exhausted push retries."
          exit 1
