name: Masters Pool Entry
description: Submit your six picks for the Masters fantasy pool.
title: "[Entry] "
labels: ["entry"]
body:
  - type: markdown
    attributes:
      value: |
        Pick **six** golfers from the Masters field. Your team score each round
        is the sum of your **best four** golfers' scores to par. Lowest team
        total after Sunday wins.

        Use the player's full name as it appears in the field
        (e.g. "Scottie Scheffler", not "Scheffler"). The site has a complete
        searchable list under **Field**.

        You can resubmit any time before the tournament starts — the most
        recent accepted entry under your GitHub account replaces the old one.
  - type: input
    id: display_name
    attributes:
      label: Display name
      description: How you want to appear on the leaderboard.
      placeholder: e.g. Dave D.
    validations:
      required: true
  - type: input
    id: pick_1
    attributes:
      label: Pick 1
      placeholder: e.g. Scottie Scheffler
    validations:
      required: true
  - type: input
    id: pick_2
    attributes:
      label: Pick 2
    validations:
      required: true
  - type: input
    id: pick_3
    attributes:
      label: Pick 3
    validations:
      required: true
  - type: input
    id: pick_4
    attributes:
      label: Pick 4
    validations:
      required: true
  - type: input
    id: pick_5
    attributes:
      label: Pick 5
    validations:
      required: true
  - type: input
    id: pick_6
    attributes:
      label: Pick 6
    validations:
      required: true
